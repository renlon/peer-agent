<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">peer-agent logo</title>
  <desc id="desc">A bold logo with two coding agent terminals connected by a bridge, representing Codex and Claude Code working together.</desc>
  <defs>
    <linearGradient id="bg" x1="84" y1="44" x2="876" y2="276" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6E8"/>
      <stop offset="0.52" stop-color="#F4EFE6"/>
      <stop offset="1" stop-color="#D8F0E8"/>
    </linearGradient>
    <linearGradient id="leftPanel" x1="177" y1="92" x2="358" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F47B4A"/>
      <stop offset="1" stop-color="#D6542E"/>
    </linearGradient>
    <linearGradient id="rightPanel" x1="606" y1="86" x2="787" y2="224" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1FA39A"/>
      <stop offset="1" stop-color="#0E6B6C"/>
    </linearGradient>
    <filter id="shadow" x="96" y="24" width="768" height="272" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0E1C1D" flood-opacity="0.14"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="108" y="40" width="744" height="240" rx="34" fill="url(#bg)"/>
  </g>

  <circle cx="179" cy="74" r="11" fill="#F47B4A" fill-opacity="0.22"/>
  <circle cx="214" cy="74" r="11" fill="#F4B183" fill-opacity="0.35"/>
  <circle cx="249" cy="74" r="11" fill="#1FA39A" fill-opacity="0.22"/>

  <rect x="154" y="94" width="205" height="134" rx="24" fill="url(#leftPanel)"/>
  <rect x="602" y="94" width="205" height="134" rx="24" fill="url(#rightPanel)"/>

  <path d="M200 151L227 177L200 203" stroke="#FFF8F0" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M248 204H305" stroke="#FFF8F0" stroke-width="13" stroke-linecap="round"/>

  <path d="M648 151L675 177L648 203" stroke="#E7FFFB" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M696 204H753" stroke="#E7FFFB" stroke-width="13" stroke-linecap="round"/>

  <path d="M359 160C401 118 465 118 507 160" stroke="#173536" stroke-width="12" stroke-linecap="round"/>
  <path d="M451 186C493 228 557 228 599 186" stroke="#173536" stroke-width="12" stroke-linecap="round"/>
  <circle cx="402" cy="159" r="13" fill="#173536"/>
  <circle cx="479" cy="156" r="13" fill="#F47B4A"/>
  <circle cx="557" cy="188" r="13" fill="#1FA39A"/>

  <text x="154" y="258" fill="#142729" font-family="Avenir Next, Inter, Segoe UI, sans-serif" font-size="54" font-weight="700" letter-spacing="-1.5">peer-agent</text>
  <text x="157" y="286" fill="#50696B" font-family="Avenir Next, Inter, Segoe UI, sans-serif" font-size="18" font-weight="500" letter-spacing="0.4">Claude Code ↔ Codex for real code review, patches, and debates</text>
</svg>
